<!DOCTYPE html>
<html>
<head>
  <title>MindFlow Authentication</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .container {
      text-align: center;
    }
    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="loader"></div>
    <p>Completing authentication...</p>
  </div>
  
  <script>
    // This page is opened after OAuth completes
    // Extract token from URL and pass to extension
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const userStr = params.get('user');
    
    if (token && userStr) {
      const user = JSON.parse(decodeURIComponent(userStr));
      
      // Store in chrome storage
      chrome.storage.local.set({ token, user }, () => {
        // Notify popup
        chrome.runtime.sendMessage({ 
          type: 'AUTH_SUCCESS',
          token,
          user
        });
        
        // Close this window
        setTimeout(() => window.close(), 500);
      });
    } else {
      // No token, show error
      document.querySelector('.container').innerHTML = '<p>❌ Authentication failed</p>';
      setTimeout(() => window.close(), 2000);
    }
  </script>
</body>
</html>
